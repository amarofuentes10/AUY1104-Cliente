apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-ejemplo-deployment
  labels:
    app: api-ejemplo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-ejemplo
  template:
    metadata:
      labels:
        app: api-ejemplo
    spec:
      containers:
      - name: api-ejemplo
        image: amaroantonio/auy1104-api-ejemplo:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-ejemplo-service
spec:
  type: NodePort
  selector:
    app: api-ejemplo
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080